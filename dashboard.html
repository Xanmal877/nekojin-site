<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serial Site History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --surface2:  #18181f;
    --border:    #1f1f2e;
    --border2:   #2a2a3a;
    --text:      #c8c8d8;
    --muted:     #4a4a60;
    --faint:     #282838;

    --rr:   #f59e0b;
    --sh:   #7c3aed;
    --wp:   #f97316;
    --tot:  #22c55e;

    --pos:  #22c55e;
    --neg:  #ef4444;
    --neu:  #2e2e40;

    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  /* subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--faint) 1px, transparent 1px),
      linear-gradient(90deg, var(--faint) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  body > * { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(99,102,241,0.6));
  }

  header h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #e8e8f0;
    text-transform: uppercase;
  }

  header p {
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.06em;
  }

  /* ── CONTROLS BAR ── */
  .top-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .story-tab {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 5px 16px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .story-tab:hover { border-color: #6366f1; color: var(--text); }
  .story-tab.active { background: #6366f1; border-color: #6366f1; color: #fff; }

  .divider { width: 1px; height: 22px; background: var(--border2); }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:hover { border-color: #6366f1; }

  .scrape-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .scrape-btn:hover:not(:disabled) { border-color: var(--pos); color: var(--pos); }
  .scrape-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .scrape-btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.15s;
  }
  .scrape-btn:hover:not(:disabled) .dot { background: var(--pos); }
  .scrape-btn.scraping .dot {
    background: var(--rr);
    animation: pulse 0.8s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── FEED ── */
  .feed {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── ENTRY CARD ── */
  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .entry-header {
    background: var(--surface2);
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .entry-header .story-title { color: #c8c8e8; font-weight: 700; letter-spacing: 0.1em; }
  .entry-header .entry-ts { color: var(--muted); }

  /* ── PLATFORM ROWS ── */
  .platform-rows { padding: 0; }

  .platform-row {
    display: grid;
    grid-template-columns: 110px 1fr 1fr 1fr 80px;
    align-items: center;
    padding: 9px 16px;
    border-bottom: 1px solid var(--faint);
    gap: 8px;
  }
  .platform-row:last-child { border-bottom: none; }
  .platform-row.total-row {
    background: rgba(34,197,94,0.04);
    border-top: 1px solid var(--border);
    border-bottom: none;
  }

  .platform-name {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .platform-name.royalroad  { color: var(--rr); }
  .platform-name.scribblehub { color: var(--sh); }
  .platform-name.wattpad    { color: var(--wp); }
  .platform-name.total      { color: var(--tot); }
  .platform-name.none       { color: var(--faint); }

  .stat-cell {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 700;
    color: #e0e0f0;
  }
  .stat-value.na { color: var(--faint); font-weight: 400; font-size: 0.78rem; }

  .delta {
    font-family: var(--mono);
    font-size: 0.65rem;
    margin-top: 1px;
  }
  .delta.pos { color: var(--pos); }
  .delta.neg { color: var(--neg); }
  .delta.zero { color: var(--neu); }

  /* ── DERIVED METRICS CELL ── */
  .derived-cell {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .derived-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .derived-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .derived-value {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: #9090b8;
  }
  .derived-value.na { color: var(--faint); font-size: 0.72rem; }

  /* ── SPARKLINES ── */
  .sparkline-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
  }
  .spark-row {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .spark-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sparkline {
    display: block;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
  }

  /* ── SCRAPE STATUS TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-color: var(--pos); color: var(--pos); }
  #toast.err  { border-color: var(--neg); color: var(--neg); }

  /* ── COLUMN HEADERS HINT ── */
  .col-headers {
    max-width: 820px;
    margin: 0 auto 6px;
    display: grid;
    grid-template-columns: 110px 1fr 1fr 1fr 80px;
    gap: 8px;
    padding: 0 16px;
  }
  .col-hdr {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .col-hdr:first-child { color: transparent; }

  @media (max-width: 600px) {
    .platform-row { grid-template-columns: 80px 1fr 1fr; }
    .sparkline-cell, .derived-cell { display: none; }
    .col-headers { grid-template-columns: 80px 1fr 1fr; }
    .col-hdr:nth-child(4), .col-hdr:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <span class="header-icon">📖</span>
  <h1>Serial Site History</h1>
  <p id="last-updated">Loading...</p>
</header>

<div class="top-bar" id="top-bar">
  <!-- tabs injected by JS -->
  <div class="divider"></div>
  <select id="sort-order">
    <option value="desc">Newest First</option>
    <option value="asc">Oldest First</option>
  </select>
  <div class="divider"></div>
  <button class="scrape-btn" id="scrape-btn" onclick="triggerScrape()">
    <span class="dot"></span><span class="btn-label">Scrape Now</span>
  </button>
</div>

<div class="col-headers">
  <div class="col-hdr">Platform</div>
  <div class="col-hdr">Followers / Reads</div>
  <div class="col-hdr">Views</div>
  <div class="col-hdr">Chapters</div>
  <div class="col-hdr">Trend (views)</div>
</div>

<div class="feed" id="feed"></div>

<div id="toast"></div>

<script>
const PLATFORM_ORDER  = ['royalroad', 'scribblehub', 'wattpad'];
const PLATFORM_LABELS = { royalroad: 'Royal Road', scribblehub: 'ScribbleHub', wattpad: 'Wattpad' };
const STAT_LABELS     = { followers: 'Followers', views: 'Views', chapters: 'Chapters' };
const WATTPAD_LABELS  = { followers: 'Votes',     views: 'Reads',  chapters: 'Parts'    };
const PLATFORM_COLORS = { royalroad: '#f59e0b', scribblehub: '#7c3aed', wattpad: '#f97316' };

let allData    = null;
let activeStory = 'all';
let sortOrder   = 'desc';

// ── DATA LOADING ────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('/data');
  allData = await res.json();
  const updated = new Date(allData.lastUpdated);
  document.getElementById('last-updated').textContent =
    `Last scraped: ${updated.toLocaleDateString()} at ${updated.toLocaleTimeString()}`;
  buildTabs();
  render();
}

// ── TABS ────────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('top-bar');
  // Remove old tabs
  bar.querySelectorAll('.story-tab').forEach(t => t.remove());
  const divider = bar.querySelector('.divider');

  const titles = new Set();
  for (const s of Object.values(allData.stories)) titles.add(s.title);

  const makeTab = (label, story) => {
    const t = document.createElement('div');
    t.className = 'story-tab' + (story === activeStory ? ' active' : '');
    t.textContent = label;
    t.dataset.story = story;
    t.onclick = () => setActiveStory(story);
    bar.insertBefore(t, divider);
  };
  makeTab('All', 'all');
  for (const title of titles) makeTab(title, title);
}

function setActiveStory(story) {
  activeStory = story;
  document.querySelectorAll('.story-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.story === story));
  render();
}

// ── SPARKLINE GENERATOR ─────────────────────────────────────────
function buildSparkline(values, color, width = 64, height = 20) {
  // values: array of numbers (oldest to newest)
  const valid = values.filter(v => v !== null && v !== undefined);
  if (valid.length < 2) return null;

  const min = Math.min(...valid);
  const max = Math.max(...valid);
  const range = max - min || 1;

  const pts = valid.map((v, i) => {
    const x = (i / (valid.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 2) - 1;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.classList.add('sparkline');

  // area fill
  const area = document.createElementNS(ns, 'polygon');
  const lastX = ((valid.length - 1) / (valid.length - 1)) * width;
  area.setAttribute('points', `0,${height} ${pts.join(' ')} ${lastX},${height}`);
  area.setAttribute('fill', color + '22');
  svg.appendChild(area);

  // line
  const polyline = document.createElementNS(ns, 'polyline');
  polyline.setAttribute('points', pts.join(' '));
  polyline.setAttribute('fill', 'none');
  polyline.setAttribute('stroke', color);
  polyline.setAttribute('stroke-width', '1.5');
  polyline.setAttribute('stroke-linecap', 'round');
  polyline.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(polyline);

  // endpoint dot
  const lastPt = pts[pts.length - 1].split(',');
  const dot = document.createElementNS(ns, 'circle');
  dot.setAttribute('cx', lastPt[0]);
  dot.setAttribute('cy', lastPt[1]);
  dot.setAttribute('r', '2');
  dot.setAttribute('fill', color);
  svg.appendChild(dot);

  return svg;
}

// ── DELTA HELPERS ────────────────────────────────────────────────
function fmtDelta(delta) {
  if (delta === null) return '';
  if (delta > 0) return `<div class="delta pos">▲ ${delta.toLocaleString()}</div>`;
  if (delta < 0) return `<div class="delta neg">▼ ${Math.abs(delta).toLocaleString()}</div>`;
  return `<div class="delta zero">—</div>`;
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  // Build: { date -> { title -> { platform -> { ...metrics, prev, history } } } }
  const byDate = {};

  for (const story of Object.values(allData.stories)) {
    if (activeStory !== 'all' && story.title !== activeStory) continue;

    story.history.forEach((entry, i) => {
      const date = entry.date;
      if (!byDate[date]) byDate[date] = {};
      if (!byDate[date][story.title]) byDate[date][story.title] = {};

      const prev = story.history[i + 1] ?? null;

      // build historical views array for sparkline (oldest first)
      const histViews = story.history
        .slice().reverse()
        .map(h => h.views);

      byDate[date][story.title][story.platform] = {
        followers: entry.followers,
        views:     entry.views,
        chapters:  entry.chapters,
        timestamp: entry.timestamp ?? date,
        prev,
        histViews,
      };
    });
  }

  const dates = Object.keys(byDate).sort((a, b) =>
    sortOrder === 'desc' ? b.localeCompare(a) : a.localeCompare(b));

  if (dates.length === 0) {
    feed.innerHTML = '<div class="empty">No data yet.</div>';
    return;
  }

  for (const date of dates) {
    const titles = Object.keys(byDate[date]).sort();

    for (const title of titles) {
      const platformData = byDate[date][title];
      const sampleEntry  = Object.values(platformData)[0];
      const ts           = new Date(sampleEntry.timestamp);
      const timeStr      = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const card = document.createElement('div');
      card.className = 'entry-card';

      card.innerHTML = `
        <div class="entry-header">
          <span class="story-title">${title.toUpperCase()}</span>
          <span class="entry-ts">${date} · ${timeStr}</span>
        </div>
        <div class="platform-rows"></div>
      `;

      const rowsEl = card.querySelector('.platform-rows');

      // totals for combined row
      let totFollowers = 0, totViews = 0, totChapters = null;
      let totPrevFollowers = 0, totPrevViews = 0;
      let anyData = false;

      for (const platform of PLATFORM_ORDER) {
        const data   = platformData[platform];
        const labels = platform === 'wattpad' ? WATTPAD_LABELS : STAT_LABELS;
        const color  = PLATFORM_COLORS[platform];

        const row = document.createElement('div');
        row.className = 'platform-row';

        if (!data) {
          row.innerHTML = `
            <div class="platform-name none">${PLATFORM_LABELS[platform]}</div>
            <div class="stat-cell"><div class="stat-value na">—</div></div>
            <div class="stat-cell"><div class="stat-value na">—</div></div>
            <div class="stat-cell"><div class="stat-value na">—</div></div>
            <div></div>
          `;
        } else {
          anyData = true;
          const { followers, views, chapters, prev, histViews } = data;

          const followersDelta  = (followers !== null && prev?.followers !== undefined) ? followers - prev.followers : null;
          const viewsDelta      = (views     !== null && prev?.views     !== undefined) ? views     - prev.views     : null;
          const chaptersDelta   = (chapters  !== null && prev?.chapters  !== undefined) ? chapters  - prev.chapters  : null;

          // accumulate for totals
          if (followers !== null) { totFollowers += followers; totPrevFollowers += (prev?.followers ?? followers); }
          if (views     !== null) { totViews     += views;     totPrevViews     += (prev?.views     ?? views);     }
          if (chapters  !== null && platform === 'royalroad') totChapters = chapters; // use RR as canonical chapter count

          // derived metrics
          const vpf  = (views && followers && followers > 0) ? (views / followers).toFixed(1) : null;
          const vpc  = (views && chapters  && chapters  > 0) ? Math.round(views / chapters)    : null;

          row.innerHTML = `
            <div class="platform-name ${platform}">${PLATFORM_LABELS[platform]}</div>
            <div class="stat-cell">
              <div class="stat-label">${labels.followers}</div>
              <div class="stat-value ${followers === null ? 'na' : ''}">${followers !== null ? followers.toLocaleString() : '—'}</div>
              ${fmtDelta(followersDelta)}
            </div>
            <div class="stat-cell">
              <div class="stat-label">${labels.views}</div>
              <div class="stat-value ${views === null ? 'na' : ''}">${views !== null ? views.toLocaleString() : '—'}</div>
              ${fmtDelta(viewsDelta)}
            </div>
            <div class="stat-cell">
              <div class="stat-label">${labels.chapters}</div>
              <div class="stat-value ${chapters === null ? 'na' : ''}">${chapters !== null ? chapters.toLocaleString() : '—'}</div>
              ${fmtDelta(chaptersDelta)}
            </div>
            <div class="sparkline-cell" id="spark-${platform}-${date}-${title.replace(/\s/g,'-')}"></div>
          `;

          rowsEl.appendChild(row);

          // Inject sparkline after DOM append
          const sparkContainer = card.querySelector(`#spark-${platform}-${date}-${title.replace(/\s/g,'-')}`);
          if (histViews.length >= 2) {
            const sparkLabel = document.createElement('div');
            sparkLabel.className = 'spark-label';
            sparkLabel.textContent = 'Views trend';
            const svg = buildSparkline(histViews, color);
            if (svg) {
              sparkContainer.appendChild(sparkLabel);
              sparkContainer.appendChild(svg);
            }
          }

          // Append derived metrics as sub-row if not null
          if (vpf || vpc) {
            const derivedRow = document.createElement('div');
            derivedRow.style.cssText = `
              display: flex; gap: 16px; padding: 4px 16px 6px 134px;
              font-family: var(--mono); font-size: 0.64rem; color: var(--muted);
              border-bottom: 1px solid var(--faint);
            `;
            if (vpf) derivedRow.innerHTML += `<span>views/follower <strong style="color:#9090b8">${vpf}</strong></span>`;
            if (vpc) derivedRow.innerHTML += `<span>views/chapter <strong style="color:#9090b8">${vpc.toLocaleString()}</strong></span>`;
            rowsEl.appendChild(derivedRow);
          }

          continue; // skip default rowsEl.appendChild
        }

        rowsEl.appendChild(row);
      }

      // ── TOTAL ROW ───────────────────────────────────────────
      if (anyData && Object.keys(platformData).length > 1) {
        const totFollowersDelta = totFollowers - totPrevFollowers;
        const totViewsDelta     = totViews     - totPrevViews;

        const totalRow = document.createElement('div');
        totalRow.className = 'platform-row total-row';
        totalRow.innerHTML = `
          <div class="platform-name total">Total</div>
          <div class="stat-cell">
            <div class="stat-label">Followers</div>
            <div class="stat-value">${totFollowers.toLocaleString()}</div>
            ${fmtDelta(totFollowersDelta)}
          </div>
          <div class="stat-cell">
            <div class="stat-label">Views</div>
            <div class="stat-value">${totViews.toLocaleString()}</div>
            ${fmtDelta(totViewsDelta)}
          </div>
          <div class="stat-cell">
            <div class="stat-label">Chapters (RR)</div>
            <div class="stat-value ${totChapters === null ? 'na' : ''}">${totChapters !== null ? totChapters.toLocaleString() : '—'}</div>
          </div>
          <div></div>
        `;
        rowsEl.appendChild(totalRow);
      }

      feed.appendChild(card);
    }
  }
}

// ── SORT ─────────────────────────────────────────────────────────
document.getElementById('sort-order').addEventListener('change', e => {
  sortOrder = e.target.value;
  render();
});

// ── SCRAPE NOW ───────────────────────────────────────────────────
async function triggerScrape() {
  const btn = document.getElementById('scrape-btn');
  const dot = btn.querySelector('.dot');
  const label = btn.querySelector('.btn-label');
  btn.disabled = true;
  btn.classList.add('scraping');

  // Show elapsed timer while scrape runs
  let elapsed = 0;
  const timer = setInterval(() => {
    elapsed++;
    label.textContent = elapsed + 's…';
  }, 1000);
  label.textContent = '0s…';
  showToast('Scrape running — this takes a few minutes', '');

  try {
    // /scrape now holds the connection open until the scraper finishes
    const res = await fetch('/scrape', { method: 'POST' });
    clearInterval(timer);
    if (res.ok) {
      showToast('Done (' + elapsed + 's) — reloading data', 'ok');
      await loadData();
    } else {
      const msg = await res.text().catch(() => 'unknown error');
      showToast('Scrape failed: ' + msg, 'err');
    }
  } catch (e) {
    clearInterval(timer);
    showToast('Scrape failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.classList.remove('scraping');
    label.textContent = 'Scrape Now';
  }
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── SSE AUTO-REFRESH ─────────────────────────────────────────────
const events = new EventSource('/events');
events.onmessage = () => loadData();

// ── BOOT ─────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
