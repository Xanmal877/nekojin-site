<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book - Nekojin Interactive</title>
  <meta name="description" content="Read books set within the Xanrea universe.">
  <meta property="og:title" content="Book - Nekojin Interactive">
  <meta property="og:description" content="Read books set within the Xanrea universe.">
  <meta property="og:image" content="https://worldofxanrea.com/covers/game-cover-1772952121717.png">
  <meta property="og:url" content="https://worldofxanrea.com/book">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#0a0614">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/covers/game-cover-1772952121717.png">
  <link rel="alternate" type="application/atom+xml" title="Nekojin Interactive Feed" href="https://worldofxanrea.com/rss.xml">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── BOOK HERO ── */
    .book-hero {
      padding: 6rem 2rem 3rem;
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 680px) {
      .book-hero { grid-template-columns: 1fr; gap: 2rem; padding: 5rem 1.5rem 2rem; }
    }

    .book-hero-cover {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(124,58,237,0.15);
      aspect-ratio: 2/3;
      background: linear-gradient(160deg, #1a0a3d, #0f1a3a);
    }
    .book-hero-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .book-hero-cover .placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
    }

    .book-hero-info { display: flex; flex-direction: column; gap: 1rem; }
    .book-hero-vol {
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--royal-light);
    }
    .book-hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--ink);
      line-height: 1.1;
    }
    .book-hero-desc {
      font-size: 0.92rem;
      line-height: 1.75;
      color: rgba(212,200,240,0.78);
      white-space: pre-wrap;
    }
    .book-hero-tags {
      display: flex; flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.25rem;
    }
    .book-hero-tag {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.22rem 0.55rem; border-radius: 6px;
      background: rgba(124,58,237,0.1);
      color: var(--royal-light);
      border: 1px solid rgba(124,58,237,0.18);
    }
    .book-hero-cta {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .book-hero-cta a {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.1rem; border-radius: 10px;
      text-decoration: none; font-size: 0.82rem;
      font-weight: 600; transition: all 0.2s;
    }
    .book-hero-cta a:hover { transform: translateY(-1px); }
    .cta-rr  { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; }
    .cta-rr:hover  { background: rgba(245,158,11,0.18); border-color: rgba(245,158,11,0.5); }
    .cta-sh  { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); color: #a78bfa; }
    .cta-sh:hover  { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.5); }
    .cta-kdp { background: rgba(255,153,0,0.1); border: 1px solid rgba(255,153,0,0.3); color: #FF9900; }
    .cta-kdp:hover { background: rgba(255,153,0,0.18); border-color: rgba(255,153,0,0.5); }
    .cta-wp  { background: rgba(251,146,60,0.1); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .cta-wp:hover  { background: rgba(251,146,60,0.18); border-color: rgba(251,146,60,0.5); }
    .cta-other { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text2); }
    .cta-other:hover { background: rgba(255,255,255,0.08); }
    .cta-read { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); color: #c4b5fd; font-weight: 600; }
    .cta-read:hover { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.6); }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--muted); text-decoration: none;
      font-size: 0.82rem; margin-bottom: 1rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* ── MORE BOOKS ── */
    .more-section {
      padding: 4rem 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .more-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }
    .more-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.25rem;
    }
    .more-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      transition: all 0.25s;
      display: block;
    }
    .more-card:hover {
      transform: translateY(-4px);
      border-color: var(--border2);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    }
    .more-cover {
      aspect-ratio: 2/3;
      overflow: hidden;
      background: linear-gradient(160deg, #1a0a3d, #0f1a3a);
    }
    .more-cover img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .more-info { padding: 0.8rem; }
    .more-name {
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.2;
    }

    /* ── NOT FOUND ── */
    .book-not-found {
      text-align: center;
      padding: 8rem 2rem;
      color: var(--muted);
    }
    .book-not-found h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--ink);
      margin-bottom: 0.75rem;
    }
    .book-not-found p { margin-bottom: 1.5rem; font-size: 0.9rem; }
    .book-not-found a {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text2);
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .book-not-found a:hover { border-color: var(--border2); background: var(--surface2); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><div class="paw" aria-hidden="true"></div> Nekojin Interactive</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/books" class="active">Books</a></li>
    <li><a href="/games">Games</a></li>
    <li><a href="/about">About</a></li>
  </ul>
  <div class="nav-search-wrap">
    <input type="text" class="nav-search" id="nav-search" placeholder="Search books…" autocomplete="off">
    <div class="nav-search-results" id="nav-search-results"></div>
  </div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-drawer" id="nav-drawer">
  <ul>
    <li><input type="text" class="drawer-search" id="drawer-search" placeholder="Search books…" autocomplete="off"></li>
    <li><div class="drawer-search-results" id="drawer-search-results"></div></li>
    <li><a href="/">Home</a></li>
    <li><a href="/books" class="active">Books</a></li>
    <li><a href="/games">Games</a></li>
    <li><a href="/about">About</a></li>
  </ul>
</div>

<main>
  <div id="book-container">
    <div style="text-align:center;padding:8rem 2rem;color:var(--muted);">Loading…</div>
  </div>

  <div class="more-section" id="more-section" style="display:none;">
    <h2 class="more-title">More Books</h2>
    <div class="more-grid" id="more-grid"></div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-logo"><div class="tama-icon" aria-hidden="true"></div> Nekojin Interactive</div>
    <p class="footer-tagline" id="footer-tagline">Crafting worlds</p>
    <div class="footer-links">
      <a href="/">Home</a><a href="/books">Books</a>
      <a href="/games">Games</a><a href="/about">About</a>
    </div>
    <p class="footer-copy">© 2026 Nekojin Interactive LLC. All rights reserved.</p>
  </div>
</footer>

<script>
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleNav() {
  const btn = document.getElementById('nav-hamburger');
  const drawer = document.getElementById('nav-drawer');
  const open = btn.classList.toggle('open');
  drawer.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
document.addEventListener('click', function(e) {
  const btn = document.getElementById('nav-hamburger');
  const drawer = document.getElementById('nav-drawer');
  if (btn && drawer && !btn.contains(e.target) && !drawer.contains(e.target)) {
    btn.classList.remove('open'); drawer.classList.remove('open'); document.body.style.overflow = '';
  }
});
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.nav-drawer a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('nav-hamburger').classList.remove('open');
      document.getElementById('nav-drawer').classList.remove('open');
      document.body.style.overflow = '';
    });
  });
});

// ── SITE SEARCH ────────────────────────────────────────
(async function() {
  let searchIndex = [];
  try {
    const res = await fetch('/content');
    const data = await res.json();
    searchIndex = (data.books || []).filter(b => b.visible !== false).map(b => ({
      id: b.id, title: b.title, volume: b.volume || '',
      description: b.description || '', tags: (b.tags || []).join(' '), cover: b.cover || ''
    }));
  } catch(e) { console.warn('Search init failed', e); }

  function setupSearch(inputId, resultsId) {
    const input = document.getElementById(inputId);
    const results = document.getElementById(resultsId);
    if (!input || !results) return;

    function render(q) {
      q = q.trim().toLowerCase();
      if (!q || !searchIndex.length) { results.classList.remove('visible'); return; }
      const matches = searchIndex.filter(b =>
        b.title.toLowerCase().includes(q) || b.description.toLowerCase().includes(q) ||
        b.tags.toLowerCase().includes(q) || b.volume.toLowerCase().includes(q)
      ).slice(0, 6);

      if (!matches.length) {
        results.innerHTML = '<div class="sr-empty">No books found</div>';
      } else {
        results.innerHTML = matches.map(b => `
          <a href="/book?id=${encodeURIComponent(b.id)}" class="sr-item" onclick="document.querySelectorAll('.nav-search-results,.drawer-search-results').forEach(r=>r.classList.remove('visible'));document.getElementById('nav-drawer').classList.remove('open');document.body.style.overflow='';document.getElementById('nav-hamburger').classList.remove('open')">
            ${b.cover ? `<img src="${b.cover}" alt="">` : '<div style="width:32px;height:48px;background:linear-gradient(160deg,#2d1065,#1e1b4b);border-radius:4px;flex-shrink:0;"></div>'}
            <div>
              <div class="sr-title">${esc(b.title)}</div>
              <div class="sr-meta">${esc(b.volume || b.tags.slice(0, 30) || 'Book')}</div>
            </div>
          </a>
        `).join('');
      }
      results.classList.add('visible');
    }

    let debounce;
    input.addEventListener('input', (e) => {
      clearTimeout(debounce);
      debounce = setTimeout(() => render(e.target.value), 150);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { input.value = ''; results.classList.remove('visible'); input.blur(); }
    });
    document.addEventListener('click', (e) => {
      if (!input.contains(e.target) && !results.contains(e.target)) results.classList.remove('visible');
    });
  }

  setupSearch('nav-search', 'nav-search-results');
  setupSearch('drawer-search', 'drawer-search-results');
})();

const PLAT_CTA_CLASS = { rr: 'cta-rr', sh: 'cta-sh', kdp: 'cta-kdp', wp: 'cta-wp' };
const PLAT_CTA_LABEL = { rr: '📖 Royal Road', sh: '📖 ScribbleHub', kdp: '📚 Kindle', wp: '📖 Wattpad' };

async function loadBook() {
  const params = new URLSearchParams(location.search);
  const bookId = params.get('id');
  const container = document.getElementById('book-container');

  if (!bookId) {
    container.innerHTML = `
      <div class="book-not-found">
        <h2>📖 Book not found</h2>
        <p>No book ID was provided.</p>
        <a href="/books">← Browse all books</a>
      </div>`;
    return;
  }

  let data;
  try {
    const res = await fetch('/content');
    data = await res.json();
  } catch(e) {
    container.innerHTML = '<div style="text-align:center;padding:8rem 2rem;color:var(--muted);">Failed to load book data.</div>';
    return;
  }

  const allBooks = (data.books || []).filter(b => b.visible !== false);
  const book = allBooks.find(b => b.id === bookId || b.slug === bookId);

  if (!book) {
    container.innerHTML = `
      <div class="book-not-found">
        <h2>📖 Book not found</h2>
        <p>We couldn't find a book with that ID.</p>
        <a href="/books">← Browse all books</a>
      </div>`;
    return;
  }

  // Update page title & meta
  document.title = esc(book.title) + ' - Nekojin Interactive';
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.content = esc(book.title) + ' - Nekojin Interactive';
  const ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc) ogDesc.content = esc((book.description || '').slice(0, 200)) + '…';
  const ogImg = document.querySelector('meta[property="og:image"]');
  if (ogImg && book.cover) ogImg.content = 'https://worldofxanrea.com' + book.cover;

  const tags = (book.tags || []).map(t => `<span class="book-hero-tag">${esc(t)}</span>`).join('');

  const ctas = (book.platforms || []).filter(p => p.url).map(p => {
    const cls = PLAT_CTA_CLASS[p.type] || 'cta-' + (p.type || 'other');
    const label = PLAT_CTA_LABEL[p.type] || (p.name || 'Read');
    return `<a href="${esc(p.url)}" target="_blank" rel="noopener" class="${cls}">${label}</a>`;
  }).join('');

  const readBtn = `<a href="/read?book=${encodeURIComponent(book.slug || book.id)}" class="cta-read">📖 Read Preview</a>`;

  container.innerHTML = `
    <div class="book-hero">
      <div class="book-hero-cover">
        ${book.cover
          ? `<img src="${esc(book.cover)}" alt="${esc(book.title)} cover">`
          : `<div class="placeholder">📖</div>`
        }
      </div>
      <div class="book-hero-info">
        <a href="/books" class="back-link">← All Books</a>
        ${book.volume ? `<div class="book-hero-vol">${esc(book.volume)}</div>` : ''}
        <h1 class="book-hero-title">${esc(book.title)}</h1>
        ${tags ? `<div class="book-hero-tags">${tags}</div>` : ''}
        <p class="book-hero-desc">${esc(book.description)}</p>
        <div class="book-hero-cta">${readBtn}${ctas}</div>
      </div>
    </div>
  `;

  // Footer tagline
  if (data.about && data.about.tagline) {
    document.getElementById('footer-tagline').textContent = data.about.tagline;
  }

  // More books
  const others = allBooks.filter(b => b.id !== bookId).slice(0, 4);
  if (others.length) {
    const moreSection = document.getElementById('more-section');
    const moreGrid = document.getElementById('more-grid');
    moreGrid.innerHTML = others.map(b => `
      <a href="/book?id=${encodeURIComponent(b.id)}" class="more-card">
        <div class="more-cover">
          ${b.cover ? `<img src="${esc(b.cover)}" alt="${esc(b.title)} cover" loading="lazy">`
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;">📖</div>'}
        </div>
        <div class="more-info">
          <div class="more-name">${esc(b.title)}</div>
        </div>
      </a>
    `).join('');
    moreSection.style.display = '';
  }
}

loadBook();

// Register PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

</body>
</html>
