<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read - Nekojin Interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0c1a;
      --surface: #1a1625;
      --surface2: #252035;
      --border: rgba(139,92,246,0.15);
      --accent: #8b5cf6;
      --accent2: #a78bfa;
      --text: #e8e4f0;
      --text2: #b8b0d0;
      --muted: #7a7090;
      --font-body: 'Crimson Pro', Georgia, serif;
      --font-ui: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.75;
      font-size: 18px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .reader-header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(15,12,26,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-ui); font-size: 0.85rem;
    }
    .reader-header .left {
      display: flex; align-items: center; gap: 0.75rem;
      min-width: 0;
    }
    .reader-header .back {
      color: var(--muted); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0;
    }
    .reader-header .back:hover { color: var(--accent2); }
    .reader-header .book-title {
      color: var(--text); font-weight: 600; font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .reader-header .chapter-title {
      color: var(--muted); font-size: 0.8rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .reader-header .right {
      display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;
    }
    .reader-header button {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); padding: 0.35rem 0.7rem; border-radius: 6px;
      font-family: var(--font-ui); font-size: 0.78rem; cursor: pointer;
      transition: all 0.15s;
    }
    .reader-header button:hover { background: var(--surface); border-color: var(--accent); color: var(--text); }
    .reader-header button:disabled { opacity: 0.3; cursor: not-allowed; }
    .progress-bar {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s;
    }

    /* ── CONTENT ── */
    .reader-wrap {
      max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
    }
    .chapter-heading {
      font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent2); margin-bottom: 0.5rem;
    }
    .chapter-title-display {
      font-family: var(--font-ui); font-size: 1.6rem; font-weight: 700;
      color: var(--text); margin-bottom: 2rem; line-height: 1.3;
    }
    .chapter-body {
      font-size: 1.05rem; line-height: 1.85;
    }
    .chapter-body p { margin-bottom: 1.2rem; text-align: justify; }
    .chapter-body p:first-of-type::first-letter {
      font-size: 3.2rem; font-weight: 600; float: left;
      line-height: 0.8; margin-right: 0.15rem; margin-top: 0.1rem;
      color: var(--accent2); font-family: var(--font-ui);
    }
    .chapter-body h1, .chapter-body h2, .chapter-body h3 {
      font-family: var(--font-ui); font-weight: 600;
      margin: 2rem 0 1rem; color: var(--text);
    }
    .chapter-body h1 { font-size: 1.4rem; }
    .chapter-body h2 { font-size: 1.2rem; }
    .chapter-body em { font-style: italic; color: var(--text2); }
    .chapter-body strong { font-weight: 600; color: var(--text); }
    .chapter-body blockquote {
      border-left: 3px solid var(--accent); padding-left: 1rem;
      margin: 1.5rem 0; color: var(--text2); font-style: italic;
    }

    /* ── NAV FOOTER ── */
    .chapter-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);
      font-family: var(--font-ui); font-size: 0.85rem;
    }
    .chapter-nav a {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--text2); text-decoration: none; padding: 0.5rem 0.8rem;
      border-radius: 8px; border: 1px solid var(--border); background: var(--surface);
      transition: all 0.15s; max-width: 45%;
    }
    .chapter-nav a:hover { border-color: var(--accent); color: var(--text); }
    .chapter-nav .nav-label {
      font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .chapter-nav .nav-chapter {
      font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── CTA BANNER ── */
    .cta-banner {
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(91,26,154,0.08));
      border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; margin-top: 2rem; text-align: center;
      font-family: var(--font-ui);
    }
    .cta-banner h4 { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; }
    .cta-banner p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
    .cta-banner .cta-btn {
      display: inline-block; padding: 0.6rem 1.2rem;
      background: var(--accent); color: #fff; text-decoration: none;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      transition: background 0.15s;
    }
    .cta-banner .cta-btn:hover { background: var(--accent2); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 4rem; color: var(--muted); font-family: var(--font-ui); }
    .error { text-align: center; padding: 4rem; color: #fca5a5; font-family: var(--font-ui); }

    /* ── CHAPTER LIST SIDEBAR ── */
    .toc-toggle { display: none; }
    .toc-panel {
      position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
      background: var(--surface); border-right: 1px solid var(--border);
      z-index: 30; transform: translateX(-100%);
      transition: transform 0.25s ease; overflow-y: auto;
      font-family: var(--font-ui); padding: 1rem;
    }
    .toc-panel.open { transform: translateX(0); }
    .toc-overlay {
      position: fixed; inset: 0; z-index: 25; background: rgba(0,0,0,0.5);
      display: none;
    }
    .toc-overlay.open { display: block; }
    .toc-title { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .toc-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0.6rem; border-radius: 6px;
      cursor: pointer; font-size: 0.85rem; color: var(--text2);
      transition: background 0.15s;
    }
    .toc-item:hover { background: var(--surface2); }
    .toc-item.active { background: rgba(139,92,246,0.12); color: var(--text); }
    .toc-item .num { font-size: 0.7rem; color: var(--muted); font-weight: 600; min-width: 1.5rem; }
    .toc-item .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    @media (max-width: 640px) {
      body { font-size: 16px; }
      .reader-wrap { padding: 1.2rem 1rem 3rem; }
      .chapter-title-display { font-size: 1.3rem; }
      .reader-header .chapter-title { display: none; }
      .chapter-nav a { max-width: 48%; font-size: 0.78rem; }
      .toc-toggle { display: inline-flex; }
    }
  </style>
</head>
<body>

<div class="toc-overlay" id="toc-overlay" onclick="closeToc()"></div>
<div class="toc-panel" id="toc-panel">
  <div class="toc-title">Chapters</div>
  <div id="toc-list"></div>
</div>

<header class="reader-header">
  <div class="left">
    <a href="/books" class="back">← Back</a>
    <span class="book-title" id="book-title">Loading…</span>
    <span class="chapter-title" id="header-chapter-title"></span>
  </div>
  <div class="right">
    <button class="toc-toggle" id="btn-toc" onclick="openToc()" title="Chapters">☰</button>
    <button id="btn-prev" onclick="goPrev()" disabled>← Prev</button>
    <button id="btn-next" onclick="goNext()" disabled>Next →</button>
  </div>
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</header>

<div class="reader-wrap" id="reader-wrap">
  <div class="loading" id="loading">Loading chapter…</div>
</div>

<script>
(function() {
  'use strict';

  const params = new URLSearchParams(location.search);
  const slug = params.get('book');
  const startChapter = parseInt(params.get('chapter'), 10) || 1;

  if (!slug) {
    document.getElementById('reader-wrap').innerHTML = '<div class="error">No book specified. Go to <a href="/books" style="color:var(--accent2)">Books</a>.</div>';
    return;
  }

  let chapters = [];
  let currentNum = startChapter;
  let bookInfo = null;

  async function init() {
    try {
      // Load book info from site content
      const contentRes = await fetch('/content');
      const content = await contentRes.json();
      bookInfo = content.books?.find(b => b.id === slug);
      if (bookInfo) {
        document.getElementById('book-title').textContent = bookInfo.title || slug;
        document.title = (bookInfo.title || slug) + ' - Nekojin Interactive';
      }

      // Load chapters
      const chapRes = await fetch(`/api/manuscripts/${encodeURIComponent(slug)}/chapters`);
      if (!chapRes.ok) throw new Error('No manuscript found');
      const data = await chapRes.json();
      chapters = data.chapters || [];

      if (!chapters.length) throw new Error('No chapters found');

      buildToc();
      await loadChapter(currentNum);
    } catch (err) {
      document.getElementById('reader-wrap').innerHTML = `<div class="error">${err.message}<br><br>No manuscript found for <code>${slug}.docx</code>.<br>Place your .docx in the <code>manuscripts/</code> folder.</div>`;
    }
  }

  async function loadChapter(num) {
    const ch = chapters.find(c => c.num === num);
    if (!ch) return;
    currentNum = num;

    document.getElementById('loading').style.display = 'block';
    const wrap = document.getElementById('reader-wrap');

    try {
      const res = await fetch(`/api/manuscripts/${encodeURIComponent(slug)}/chapters/${num}`);
      if (!res.ok) throw new Error('Failed to load');
      const data = await res.json();

      let html = `<div class="chapter-heading">Chapter ${data.num}</div>
        <h1 class="chapter-title-display">${escapeHtml(data.title)}</h1>
        <div class="chapter-body">${data.content}</div>`;

      // Navigation
      const prev = chapters.find(c => c.num < num);
      const next = chapters.find(c => c.num > num);
      const idx = chapters.findIndex(c => c.num === num);
      const isLastPreview = idx >= 2 && chapters.length > 3; // after 3rd chapter

      html += `<div class="chapter-nav">`;
      if (prev) {
        html += `<a href="?book=${encodeURIComponent(slug)}&chapter=${prev.num}" onclick="return navTo(${prev.num})">
          <div><div class="nav-label">Previous</div><div class="nav-chapter">${escapeHtml(prev.title)}</div></div>
        </a>`;
      } else {
        html += `<a href="/book?id=${encodeURIComponent(slug)}" style="opacity:0.6">
          <div><div class="nav-label">Back to</div><div class="nav-chapter">Book Details</div></div>
        </a>`;
      }

      if (next && !isLastPreview) {
        html += `<a href="?book=${encodeURIComponent(slug)}&chapter=${next.num}" onclick="return navTo(${next.num})" style="text-align:right">
          <div><div class="nav-label">Next</div><div class="nav-chapter">${escapeHtml(next.title)}</div></div>
        </a>`;
      } else if (isLastPreview) {
        // CTA to continue on platform
        const plat = bookInfo?.platforms?.[0];
        const platName = plat?.name || 'Royal Road';
        const platUrl = plat?.url || bookInfo?.links?.royalroad || '#';
        html += `<div style="text-align:right"><a href="${escapeHtml(platUrl)}" target="_blank" rel="noopener" class="cta-btn">Continue on ${escapeHtml(platName)} →</a></div>`;
      } else {
        html += `<span></span>`; // spacer
      }
      html += `</div>`;

      // CTA banner for preview end
      if (isLastPreview) {
        const plat = bookInfo?.platforms?.[0];
        const platName = plat?.name || 'the publishing platform';
        const platUrl = plat?.url || bookInfo?.links?.royalroad || '#';
        html += `<div class="cta-banner">
          <h4>End of preview</h4>
          <p>This book continues on ${escapeHtml(platName)}. Thanks for reading!</p>
          <a href="${escapeHtml(platUrl)}" target="_blank" rel="noopener" class="cta-btn">Continue Reading →</a>
        </div>`;
      }

      wrap.innerHTML = html;
      document.getElementById('header-chapter-title').textContent = data.title;
      updateButtons();
      updateTocActive();
      window.scrollTo(0, 0);

      // Update URL without reload
      const newUrl = `?book=${encodeURIComponent(slug)}&chapter=${num}`;
      history.replaceState(null, '', newUrl);
    } catch (err) {
      wrap.innerHTML = `<div class="error">Failed to load chapter: ${err.message}</div>`;
    }
  }

  function buildToc() {
    const list = document.getElementById('toc-list');
    list.innerHTML = chapters.map(c => `
      <div class="toc-item ${c.num === currentNum ? 'active' : ''}" data-num="${c.num}" onclick="navTo(${c.num}); closeToc();">
        <span class="num">${c.num}</span>
        <span class="name">${escapeHtml(c.title)}</span>
      </div>
    `).join('');
  }

  function updateTocActive() {
    document.querySelectorAll('.toc-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.num) === currentNum);
    });
  }

  function updateButtons() {
    const prev = chapters.find(c => c.num < currentNum);
    const next = chapters.find(c => c.num > currentNum);
    const idx = chapters.findIndex(c => c.num === currentNum);
    const hasNextPreview = next && idx < 2;

    document.getElementById('btn-prev').disabled = !prev;
    document.getElementById('btn-next').disabled = !hasNextPreview;
  }

  window.goPrev = function() {
    const prev = chapters.find(c => c.num < currentNum);
    if (prev) loadChapter(prev.num);
  };
  window.goNext = function() {
    const next = chapters.find(c => c.num > currentNum);
    const idx = chapters.findIndex(c => c.num === currentNum);
    if (next && idx < 2) loadChapter(next.num);
  };
  window.navTo = function(num) {
    loadChapter(num);
    return false;
  };
  window.openToc = function() {
    document.getElementById('toc-panel').classList.add('open');
    document.getElementById('toc-overlay').classList.add('open');
  };
  window.closeToc = function() {
    document.getElementById('toc-panel').classList.remove('open');
    document.getElementById('toc-overlay').classList.remove('open');
  };

  // Scroll progress
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  });

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
})();
</script>
</body>
</html>
